<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Eternal Health</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    /* AUTH PAGE */
    body {
      background: var(--void);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--space-xl);
    }

    .auth-wrap {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: var(--space-lg);
    }

    .auth-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--t-secondary);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color var(--dur-fast);
      font-family: var(--f-mono);
    }
    .auth-back:hover { color: var(--aurum); }

    .auth-panel {
      background: var(--depth-2);
      border: 1px solid var(--b-subtle);
      border-radius: var(--r-lg);
      padding: var(--space-xl);
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: var(--space-xl);
      text-decoration: none;
    }

    .auth-logo-mark {
      width: 30px;
      height: 30px;
      background: var(--aurum);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--f-serif);
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--void);
      flex-shrink: 0;
    }

    .auth-logo-text {
      font-family: var(--f-sans);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--t-primary);
    }

    .auth-title {
      font-family: var(--f-serif);
      font-size: 1.7rem;
      font-weight: 300;
      color: var(--t-primary);
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .auth-subtitle {
      font-size: 0.82rem;
      color: var(--t-secondary);
      margin-bottom: var(--space-xl);
    }

    .auth-divider {
      position: relative;
      text-align: center;
      margin: var(--space-lg) 0;
    }
    .auth-divider::before {
      content: '';
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      height: 1px;
      background: var(--b-subtle);
    }
    .auth-divider span {
      position: relative;
      background: var(--depth-2);
      padding: 0 var(--space-md);
      font-size: 0.72rem;
      color: var(--t-tertiary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: var(--f-mono);
    }

    .auth-footer-text {
      text-align: center;
      font-size: 0.8rem;
      color: var(--t-secondary);
      margin-top: var(--space-lg);
    }

    .demo-hint {
      background: var(--aurum-04);
      border: 1px solid rgba(201,169,106,0.15);
      border-radius: var(--r-md);
      padding: 12px 16px;
      text-align: center;
    }

    .demo-hint p {
      font-family: var(--f-mono);
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      color: var(--t-secondary);
    }

    .demo-hint strong { color: var(--aurum); }

    .dual-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-sm);
    }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <a href="../index.html" class="auth-back">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M9 3L4 7L9 11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      Back to home
    </a>

    <div class="auth-panel">
      <a href="../index.html" class="auth-logo">
        <div class="auth-logo-mark">EH</div>
        <span class="auth-logo-text">Eternal Health</span>
      </a>

      <h1 class="auth-title">Enter System</h1>
      <p class="auth-subtitle">Access your longevity dashboard</p>

      <div id="alertContainer"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2 3.5L7 8L12 3.5M2 3.5H12V11H2V3.5Z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <input type="email" id="email" class="form-input" placeholder="your@email.com" required autocomplete="email">
          </div>
        </div>

        <div class="form-group">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <label class="form-label" style="margin:0">Password</label>
            <a href="#" style="font-size:0.72rem;color:var(--aurum);font-family:var(--f-mono);letter-spacing:0.04em">Forgot?</a>
          </div>
          <div class="input-wrapper">
            <svg class="input-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
              <rect x="2.5" y="6.5" width="9" height="6.5" rx="1.2" stroke="currentColor" stroke-width="1.2"/>
              <path d="M4.5 6.5V4.5C4.5 3.12 5.62 2 7 2C8.38 2 9.5 3.12 9.5 4.5V6.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
            <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="input-toggle" id="togglePassword">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M1 7C1 7 3 3 7 3C11 3 13 7 13 7C13 7 11 11 7 11C3 11 1 7 1 7Z" stroke="currentColor" stroke-width="1.2"/>
                <circle cx="7" cy="7" r="1.8" stroke="currentColor" stroke-width="1.2"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-large" id="submitBtn">
          <span id="btnText">Enter System</span>
          <div id="btnSpinner" class="spinner hidden"></div>
        </button>
      </form>

      <div class="auth-divider"><span>or</span></div>

      <div class="dual-btns">
        <button class="btn btn-outline" onclick="demoLogin()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <circle cx="7" cy="5" r="2.5" stroke="currentColor" stroke-width="1.2"/>
            <path d="M2 13C2 10.24 4.24 8 7 8C9.76 8 12 10.24 12 13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          Demo Access
        </button>
        <button class="btn btn-outline" onclick="window.location.href='register.html'">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M7 1V13M1 7H13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          Register
        </button>
      </div>

      <p class="auth-footer-text">
        No account? <a href="register.html">Create one free</a>
      </p>
    </div>

    <div class="demo-hint">
      <p>
        <strong>Demo:</strong> Click "Demo Access" for instant dashboard entry — no registration required
      </p>
    </div>
  </div>

  <script src="../js/database.js"></script>
  <script>
    KlothoDB.init().then(() => {
      KlothoAuth.getCurrentUser().then(user => {
        if (user) window.location.href = 'dashboard.html';
      });
    });

    document.getElementById('togglePassword').addEventListener('click', function() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn      = document.getElementById('submitBtn');
      const btnText  = document.getElementById('btnText');
      const spinner  = document.getElementById('btnSpinner');
      const alertEl  = document.getElementById('alertContainer');

      alertEl.innerHTML = '';
      btn.disabled = true;
      btnText.textContent = 'Authenticating...';
      spinner.classList.remove('hidden');

      try {
        await KlothoAuth.login(
          document.getElementById('email').value,
          document.getElementById('password').value
        );
        window.location.href = 'dashboard.html';
      } catch (err) {
        alertEl.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
        btn.disabled = false;
        btnText.textContent = 'Enter System';
        spinner.classList.add('hidden');
      }
    });

    async function demoLogin() {
      const email    = 'demo@eternal.health';
      const password = 'demo12345';
      try {
        await KlothoAuth.login(email, password);
        window.location.href = 'dashboard.html';
      } catch (e) {
        try {
          await KlothoAuth.register({
            email, password,
            name: 'Demo User',
            birthDate: '1988-03-15',
            gender: 'male'
          });
          window.location.href = 'dashboard.html';
        } catch (e2) {
          try {
            await KlothoAuth.login(email, password);
            window.location.href = 'dashboard.html';
          } catch (e3) {
            document.getElementById('alertContainer').innerHTML =
              `<div class="alert alert-error">Demo error. Please register manually.</div>`;
          }
        }
      }
    }
  </script>
</body>
</html>
